<!doctype html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Document</title>
	<!-- 폰트어썸 불러오기 -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

	<!-- 제이쿼리 불러오기 -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
	<div class="main_banner con-min-width">
        <div class="bg"></div>
        <div class="con img-box">
            <img src="../imgs/imgi_21_main-bg3.png" alt="banner">
        </div>
    </div>

	<style>
		/* 노말라이즈 */
		body,
		ul,
		li {
			margin: 0;
			padding: 0;
			list-style: none;
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		/* 라이브러리 */
		.border-red {
			border: 4px solid red;
		}

		.border-pink {
			border: 4px solid pink;
		}

		.border-blue {
			border: 4px solid blue;
		}

		.border-green {
			border: 4px solid green;
		}

		.border-black {
			border: 4px solid black;
		}

		.border-gold {
			border: 4px solid gold;
		}

		.flex {
			display: flex;
		}

		.flex-jc-e {
			justify-content: flex-end;
		}

		.flex-jc-s {
			justify-content: flex-start;
		}

		.flex-jc-c {
			justify-content: center;
		}

		.flex-jc-sb {
			justify-content: space-between;
		}

		.flex-ai-c {
			align-items: center;
		}

		.flex-as-c {
			align-self: center;
		}

		.flex-grow-1 {
			flex-grow: 1;
		}

		.height-100p {
			height: 100%;
		}

		.block {
			display: block;
		}

		.con {
			margin-left: auto;
			margin-right: auto;
		}

		.img-box>img {
			width: 100%;
			display: block;
		}

		.relative {
			position: relative;
		}

		/* 커스텀 */
		.con {
			width: 1080px;
		}

		.con-min-width {
			min-width: 1080px;
		}

		::selection {
			background-color: #ffe100;
		}

		/* ------------- 메인 배너 시작 ------------- */
        .main_banner {
            position: relative;
        }

        .main_banner .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 648px;
            z-index: -1;
            background-color: #ffef6b;
        }
		/* ------------- 메인 배너 끝 ------------- */
	</style>
</body>
</html>
